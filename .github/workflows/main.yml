name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sidp
          POSTGRES_PASSWORD: sidp
          POSTGRES_DB: sidp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sidp"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://sidp:sidp@localhost:5432/sidp_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipenv and dependencies
        run: |
          pip install pipenv
          pipenv install --dev --deploy

      - name: Run migrations
        run: pipenv run alembic upgrade head

      - name: Test
        run: pipenv run pytest

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: email_reviewer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv and dependencies
        run: |
          pip install pipenv
          pipenv install --dev --deploy

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/email_reviewer_test
        run: pipenv run alembic upgrade head

      - name: Test
        run: pipenv run pytest
